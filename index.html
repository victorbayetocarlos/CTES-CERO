<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CTAS CERO VE</title>
  <style>
    :root{
      --bg:#0b1220; --card:#121b2f; --card2:#16213a; --text:#eef4ff; --muted:#9fb0ca;
      --line:rgba(255,255,255,.10); --accent:#4ade80; --warn:#fbbf24; --bad:#fb7185; --blue:#60a5fa;
      --shadow:0 14px 35px rgba(0,0,0,.28); --radius:18px;
    }
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#07101f 0%,#0b1220 60%,#08101d 100%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:14px}
    header{position:sticky;top:0;z-index:20;padding:12px 12px 10px;background:rgba(11,18,32,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
    h1{font-size:17px;margin:0 0 4px;font-weight:850;letter-spacing:.2px}.sub{color:var(--muted);font-size:12px;line-height:1.25}.wrap{padding:12px;max-width:720px;margin:auto}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);min-height:78px}.kpi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.45px}.kpi .val{font-size:23px;font-weight:900;margin-top:6px}.kpi.wide{grid-column:span 2}.bar{display:flex;gap:8px;overflow:auto;padding:2px 0 12px;scrollbar-width:none}.bar::-webkit-scrollbar{display:none}.chip{white-space:nowrap;border:1px solid var(--line);background:var(--card2);color:var(--text);padding:9px 11px;border-radius:999px;font-weight:750;font-size:12px}.chip.active{background:var(--accent);color:#06220f;border-color:transparent}.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin:12px 0;box-shadow:var(--shadow)}.title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.title h2{font-size:15px;margin:0}.small{font-size:12px;color:var(--muted)}select,input{width:100%;border:1px solid var(--line);border-radius:14px;background:#091226;color:var(--text);padding:12px;font-size:14px;outline:none}label{display:block;font-size:11px;color:var(--muted);margin:0 0 6px;text-transform:uppercase;letter-spacing:.35px}.filters{display:grid;grid-template-columns:1fr 1fr;gap:10px}.filters .full{grid-column:span 2}.rank{display:flex;flex-direction:column;gap:8px}.row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#0d1729;border:1px solid var(--line);border-radius:14px;padding:10px}.row strong{display:block;font-size:13px;line-height:1.15}.row .meta{font-size:11px;color:var(--muted);margin-top:4px}.pill{font-weight:900;border-radius:999px;padding:7px 9px;background:#0a2238;color:#bfe1ff;min-width:62px;text-align:center}.detail{display:flex;flex-direction:column;gap:9px}.client{background:#0d1729;border:1px solid var(--line);border-radius:16px;padding:11px}.clientTop{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.clientName{font-weight:850;font-size:14px;line-height:1.15}.clientMeta{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.35}.risk{font-size:11px;font-weight:900;border-radius:999px;padding:5px 8px;white-space:nowrap}.r1{background:rgba(74,222,128,.16);color:#9df7b9}.r2{background:rgba(251,191,36,.16);color:#fde68a}.r3{background:rgba(251,113,133,.16);color:#fecdd3}.r0{background:rgba(148,163,184,.16);color:#dbeafe}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}button,a.btn{border:0;border-radius:15px;padding:13px 10px;font-weight:900;font-size:14px;text-align:center;text-decoration:none;background:var(--accent);color:#05220e}button.secondary,a.secondary{background:#193254;color:#dbeafe;border:1px solid var(--line)}.err{background:rgba(251,113,133,.14);border:1px solid rgba(251,113,133,.35);color:#fecdd3;padding:12px;border-radius:16px;margin:12px 0}.ok{color:#a7f3d0}.hide{display:none!important}@media(min-width:640px){.grid{grid-template-columns:repeat(4,1fr)}.kpi.wide{grid-column:span 2}}
  </style>
</head>
<body>
<header>
  <h1>CTAS CERO VE</h1>
  <div class="sub">Filtro inicial: <b>Mayo = 0</b> y <b>Recuperable ≥ S/ 70</b>. Archivo esperado: <b>CTAS_CERO_VE.csv</b></div>
</header>
<main class="wrap">
  <div id="msg" class="small">Leyendo CSV...</div>

  <section class="grid" id="kpis"></section>

  <section class="panel">
    <div class="title"><h2>Filtros</h2><span id="count" class="small"></span></div>
    <div class="filters">
      <div><label>Mesa / Grupo ventas</label><select id="mesa"></select></div>
      <div><label>Vendedor</label><select id="vend"></select></div>
      <div><label>Riesgo</label><select id="riesgo"></select></div>
      <div><label>Buscar cliente</label><input id="buscar" placeholder="Nombre o código" /></div>
    </div>
  </section>

  <section class="panel">
    <div class="title"><h2>Ranking Mesa</h2><span class="small">por recuperable</span></div>
    <div id="rankMesa" class="rank"></div>
  </section>

  <section class="panel">
    <div class="title"><h2>Ranking Vendedor</h2><span class="small">por recuperable</span></div>
    <div id="rankVend" class="rank"></div>
  </section>

  <section class="panel">
    <div class="title"><h2>Detalle clientes</h2><span class="small">máx. 100</span></div>
    <div id="detail" class="detail"></div>
    <div class="btns">
      <button id="copy">Copiar WhatsApp</button>
      <a id="wa" class="btn secondary" href="#" target="_blank" rel="noopener">Abrir WhatsApp</a>
    </div>
  </section>
</main>
<script>
const FILE = 'CTAS_CERO_VE.csv';
const MIN_REC = 70;
let raw=[], base=[], view=[];
const $ = id => document.getElementById(id);
const fmt = n => Number(n||0).toLocaleString('es-PE',{maximumFractionDigits:0});
const money = n => 'S/ ' + Number(n||0).toLocaleString('es-PE',{minimumFractionDigits:0,maximumFractionDigits:0});
const norm = s => String(s??'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'');
function parseNum(v){
  if(v==null) return 0;
  let s=String(v).trim().replace(/S\/?|soles|,/gi,'');
  if(!s) return 0;
  if(s.includes('.') && s.includes(',')) s=s.replace(/\./g,'').replace(',','.');
  else if(s.includes(',')) s=s.replace(',','.');
  const n=parseFloat(s.replace(/[^0-9.-]/g,''));
  return isNaN(n)?0:n;
}
function csvParse(text){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"' && q && n==='"'){cur+='"';i++;continue}
    if(c==='"'){q=!q;continue}
    if(c===',' && !q){row.push(cur);cur='';continue}
    if((c==='\n'||c==='\r') && !q){ if(c==='\r'&&n==='\n') i++; row.push(cur); if(row.some(x=>String(x).trim()!=='')) rows.push(row); row=[]; cur=''; continue }
    cur+=c;
  }
  row.push(cur); if(row.some(x=>String(x).trim()!=='')) rows.push(row);
  return rows;
}
function pick(headers, names){
  const H=headers.map(norm);
  for(const name of names){ const i=H.indexOf(norm(name)); if(i>=0) return i; }
  for(const name of names){ const key=norm(name); const i=H.findIndex(h=>h.includes(key)||key.includes(h)); if(i>=0) return i; }
  return -1;
}
function riesgo(e,f,m,a,my){
  if(e+f+m+a+my===0) return 'Nunca compró';
  if(my>0) return 'Compró mayo';
  if(a>0) return 'Caída 1 mes';
  if(m>0) return 'Caída 2 meses';
  return 'Caída 3+ meses';
}
function loadData(text){
  const rows=csvParse(text); if(rows.length<2) throw new Error('El CSV no tiene datos.');
  const h=rows[0];
  const idx={
    cliente:pick(h,['cliente','nombrecliente','razonsocial','nomcliente','cliente_nombre']),
    codigo:pick(h,['codcliente','codigo','codigocliente','codcte','cte','clienteid']),
    mesa:pick(h,['grupoventas','grupo ventas','mesa','grupo','supervisor']),
    vendedor:pick(h,['vendedor','nomvendedor','nombrevendedor','codvendedor','asesor']),
    ene:pick(h,['enero','ene','ventaenero','enero2026']),
    feb:pick(h,['febrero','feb','ventafebrero','febrero2026']),
    mar:pick(h,['marzo','mar','ventamarzo','marzo2026']),
    abr:pick(h,['abril','abr','ventaabril','abril2026']),
    may:pick(h,['mayo','may','ventamayo','mayo2026']),
    hoy:pick(h,['hoy','preventa','venta hoy','ventahoy','pvta','recuperadohoy','recuperadoshoy'])
  };
  const must=['ene','feb','mar','abr','may'];
  const missing=must.filter(k=>idx[k]<0);
  if(missing.length) throw new Error('Faltan columnas de meses: '+missing.join(', '));
  raw=rows.slice(1).map(r=>{
    const ene=parseNum(r[idx.ene]), feb=parseNum(r[idx.feb]), mar=parseNum(r[idx.mar]), abr=parseNum(r[idx.abr]), may=parseNum(r[idx.may]);
    const positivos=[ene,feb,mar,abr].filter(x=>x>0);
    const rec=positivos.length ? positivos.reduce((a,b)=>a+b,0)/positivos.length : 0;
    const hoy=idx.hoy>=0?parseNum(r[idx.hoy]):0;
    return {
      codigo: idx.codigo>=0 ? String(r[idx.codigo]||'').trim() : '',
      cliente: idx.cliente>=0 ? String(r[idx.cliente]||'').trim() : (idx.codigo>=0?String(r[idx.codigo]||'').trim():'Cliente'),
      mesa: idx.mesa>=0 ? String(r[idx.mesa]||'Sin mesa').trim() : 'Sin mesa',
      vendedor: idx.vendedor>=0 ? String(r[idx.vendedor]||'Sin vendedor').trim() : 'Sin vendedor',
      ene,feb,mar,abr,may,hoy,recuperable:rec,
      riesgo: riesgo(ene,feb,mar,abr,may)
    };
  });
  base=raw.filter(x=>x.may===0 && x.recuperable>=MIN_REC).sort((a,b)=>b.recuperable-a.recuperable);
  initFilters(); apply();
  $('msg').innerHTML='<span class="ok">CSV cargado correctamente.</span>';
}
function optionList(id, arr, all){
  const sel=$(id), cur=sel.value;
  sel.innerHTML='<option value="">'+all+'</option>'+arr.map(x=>`<option>${escapeHtml(x)}</option>`).join('');
  if([...sel.options].some(o=>o.value===cur)) sel.value=cur;
}
function initFilters(){
  optionList('mesa',[...new Set(base.map(x=>x.mesa))].sort(),'Todas');
  optionList('riesgo',['Caída 1 mes','Caída 2 meses','Caída 3+ meses','Nunca compró'],'Todos');
  ['mesa','vend','riesgo','buscar'].forEach(id=>$(id).addEventListener(id==='buscar'?'input':'change', apply));
  $('copy').addEventListener('click', copyWA);
}
function apply(){
  const mesa=$('mesa').value, riesgo=$('riesgo').value, q=norm($('buscar').value);
  const vendedores=[...new Set(base.filter(x=>!mesa||x.mesa===mesa).map(x=>x.vendedor))].sort();
  optionList('vend',vendedores,'Todos');
  const vend=$('vend').value;
  view=base.filter(x=>(!mesa||x.mesa===mesa)&&(!vend||x.vendedor===vend)&&(!riesgo||x.riesgo===riesgo)&&(!q||norm(x.cliente+' '+x.codigo).includes(q)));
  render();
}
function sum(arr, f){return arr.reduce((a,x)=>a+(f?f(x):x),0)}
function render(){
  const k={cero:view.length,r1:view.filter(x=>x.riesgo==='Caída 1 mes').length,r2:view.filter(x=>x.riesgo==='Caída 2 meses').length,r3:view.filter(x=>x.riesgo==='Caída 3+ meses').length,r0:view.filter(x=>x.riesgo==='Nunca compró').length,pot:sum(view,x=>x.recuperable),recHoy:view.filter(x=>x.hoy>0).length};
  $('kpis').innerHTML=`
    ${kpi('Clientes Cero',fmt(k.cero))}${kpi('Caída 1',fmt(k.r1))}${kpi('Caída 2',fmt(k.r2))}${kpi('Caída 3+',fmt(k.r3))}
    ${kpi('Nunca compró',fmt(k.r0))}${kpi('Potencial Recuperable',money(k.pot),'wide')}${kpi('Recuperados Hoy',fmt(k.recHoy))}`;
  $('count').textContent=fmt(view.length)+' clientes';
  rank('rankMesa','mesa'); rank('rankVend','vendedor'); detail(); updateWA();
}
function kpi(l,v,c=''){return `<div class="kpi ${c}"><div class="lbl">${l}</div><div class="val">${v}</div></div>`}
function rank(id, field){
  const map=new Map(); view.forEach(x=>{const o=map.get(x[field])||{n:0,s:0};o.n++;o.s+=x.recuperable;map.set(x[field],o)});
  const arr=[...map].sort((a,b)=>b[1].s-a[1].s).slice(0,10);
  $(id).innerHTML=arr.length?arr.map(([name,o])=>`<div class="row"><div><strong>${escapeHtml(name)}</strong><div class="meta">${fmt(o.n)} clientes</div></div><div class="pill">${money(o.s)}</div></div>`).join(''):'<div class="small">Sin datos</div>';
}
function detail(){
  const arr=view.slice(0,100);
  $('detail').innerHTML=arr.length?arr.map((x,i)=>`<div class="client"><div class="clientTop"><div><div class="clientName">${i+1}. ${escapeHtml(x.cliente)}</div><div class="clientMeta">${escapeHtml(x.vendedor)} · ${escapeHtml(x.mesa)}<br>Recuperable: <b>${money(x.recuperable)}</b>${x.hoy>0?' · Hoy: <b>'+money(x.hoy)+'</b>':''}</div></div><span class="risk ${riskClass(x.riesgo)}">${x.riesgo}</span></div></div>`).join(''):'<div class="small">Sin clientes con este filtro.</div>';
}
function riskClass(r){return r.includes('1')?'r1':r.includes('2')?'r2':r.includes('3')?'r3':'r0'}
function waText(){
  const mesa=$('mesa').value||'Todas las mesas', vend=$('vend').value||'Todos los vendedores';
  const arr=view.slice(0,100);
  let t=`*CTAS CERO VE*\nMesa: ${mesa}\nVendedor: ${vend}\nClientes: ${arr.length}\nPotencial: ${money(sum(arr,x=>x.recuperable))}\n\n`;
  t+=arr.map((x,i)=>`${i+1}. ${x.cliente} | ${money(x.recuperable)} | ${x.riesgo}`).join('\n');
  return t;
}
function updateWA(){ $('wa').href='https://wa.me/?text='+encodeURIComponent(waText()); }
async function copyWA(){ try{ await navigator.clipboard.writeText(waText()); $('copy').textContent='Copiado ✓'; setTimeout(()=>$('copy').textContent='Copiar WhatsApp',1400);}catch(e){alert('No se pudo copiar. Usa Abrir WhatsApp.')} }
function escapeHtml(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
fetch(FILE,{cache:'no-store'}).then(r=>{if(!r.ok) throw new Error('No encontré '+FILE+' en la misma carpeta del index.html'); return r.text()}).then(loadData).catch(e=>{$('msg').innerHTML='<div class="err"><b>Error:</b> '+escapeHtml(e.message)+'<br><br>Sube el archivo como <b>CTAS_CERO_VE.csv</b> junto a este <b>index.html</b> en GitHub Pages.</div>';});
</script>
</body>
</html>
